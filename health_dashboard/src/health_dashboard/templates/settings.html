<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Settings - Health Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0f172a; color: #e2e8f0; padding: 1.5rem; max-width: 600px; margin: 0 auto;
  }
  .header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
  .header a { color: #64748b; text-decoration: none; font-size: 0.85rem; }
  h1 { font-size: 1.5rem; }
  .card { background: #1e293b; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
  .card h3 {
    font-size: 0.85rem; color: #64748b; margin-bottom: 1rem;
    text-transform: uppercase; letter-spacing: 0.03em;
  }
  .setting { margin-bottom: 1rem; }
  .setting:last-child { margin-bottom: 0; }
  .setting label { display: block; font-size: 0.875rem; margin-bottom: 0.35rem; }
  .setting .desc { font-size: 0.75rem; color: #64748b; margin-bottom: 0.35rem; }
  select {
    width: 100%; padding: 0.5rem 0.75rem; border-radius: 6px; border: 1px solid #334155;
    background: #0f172a; color: #e2e8f0; font-size: 0.875rem;
    appearance: auto;
  }
  .saved {
    color: #10b981; font-size: 0.8rem; margin-top: 0.75rem;
    opacity: 0; transition: opacity 0.2s;
  }
  .saved.show { opacity: 1; }
  .loading { color: #475569; font-size: 0.85rem; }
</style>
</head>
<body>
<div class="header">
  <a href="/">&larr; Dashboard</a>
  <h1>Settings</h1>
</div>

<div class="card">
  <h3>Units</h3>
  <div id="settings-content"><div class="loading">Loading...</div></div>
  <div class="saved" id="saved">Settings saved</div>
</div>

<script>
async function load() {
  var resp = await fetch('/api/settings');
  var settings = await resp.json();

  var html = '';
  html += '<div class="setting">';
  html += '<label for="distance-unit">Distance</label>';
  html += '<div class="desc">Used for workout distances, pace, and speed</div>';
  html += '<select id="distance-unit">';
  html += '<option value="mi"' + (settings.distance_unit === 'mi' ? ' selected' : '') + '>Miles (mi)</option>';
  html += '<option value="km"' + (settings.distance_unit === 'km' ? ' selected' : '') + '>Kilometers (km)</option>';
  html += '</select></div>';

  html += '<div class="setting">';
  html += '<label for="elevation-unit">Elevation</label>';
  html += '<div class="desc">Used for elevation gain/loss and altitude</div>';
  html += '<select id="elevation-unit">';
  html += '<option value="ft"' + (settings.elevation_unit === 'ft' ? ' selected' : '') + '>Feet (ft)</option>';
  html += '<option value="m"' + (settings.elevation_unit === 'm' ? ' selected' : '') + '>Meters (m)</option>';
  html += '</select></div>';

  html += '<div class="setting">';
  html += '<label for="temp-unit">Temperature</label>';
  html += '<div class="desc">Used for body temperature deviations</div>';
  html += '<select id="temp-unit">';
  html += '<option value="C"' + (settings.temp_unit === 'C' ? ' selected' : '') + '>&deg;C (Celsius)</option>';
  html += '<option value="F"' + (settings.temp_unit === 'F' ? ' selected' : '') + '>&deg;F (Fahrenheit)</option>';
  html += '</select></div>';

  document.getElementById('settings-content').innerHTML = html;

  document.querySelectorAll('select').forEach(function(sel) {
    sel.addEventListener('change', save);
  });
}

async function save() {
  var body = {
    distance_unit: document.getElementById('distance-unit').value,
    elevation_unit: document.getElementById('elevation-unit').value,
    temp_unit: document.getElementById('temp-unit').value,
  };
  await fetch('/api/settings', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  var el = document.getElementById('saved');
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 1500);
}

load();
</script>
</body>
</html>
