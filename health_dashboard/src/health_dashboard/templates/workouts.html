<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Workouts - Health Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.min.css">
<script src="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.iife.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9/dist/leaflet.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0f172a; color: #e2e8f0; padding: 1.5rem; max-width: 1100px; margin: 0 auto;
  }
  .header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
  .header a { color: #64748b; text-decoration: none; font-size: 0.85rem; }
  h1 { font-size: 1.5rem; }
  .no-data { color: #475569; font-size: 0.9rem; padding: 2rem 0; text-align: center; }
  .card { background: #1e293b; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
  .card h3 {
    font-size: 0.85rem; color: #64748b; margin-bottom: 0.75rem;
    text-transform: uppercase; letter-spacing: 0.03em;
  }
  .metrics { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 0.5rem; }
  .metric { padding: 0.6rem; background: #0f172a; border-radius: 8px; }
  .metric .val { font-size: 1.15rem; font-weight: 700; }
  .metric .lbl { font-size: 0.7rem; color: #64748b; margin-top: 0.15rem; }

  .cal-wrap { background: #1e293b; border-radius: 14px; padding: 1.1rem 1.1rem 1.3rem; margin-bottom: 1.5rem; }
  .cal-head { display: flex; align-items: center; justify-content: space-between; gap: 1rem; margin-bottom: 1rem; }
  .cal-title { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.01em; }
  .cal-load { font-size: 0.75rem; font-weight: 500; color: #64748b; letter-spacing: 0; }
  .cal-nav { display: flex; gap: 0.4rem; align-items: center; }
  .cal-btn {
    background: #0f172a; border: 1px solid #334155; color: #94a3b8;
    height: 32px; min-width: 32px; border-radius: 8px; cursor: pointer; font-size: 1rem;
    display: flex; align-items: center; justify-content: center; transition: all 0.15s; padding: 0;
  }
  .cal-btn:hover { background: #334155; color: #e2e8f0; }
  .cal-today { padding: 0 0.7rem; font-size: 0.78rem; }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-dow {
    text-align: center; font-size: 0.68rem; color: #64748b; text-transform: uppercase;
    letter-spacing: 0.05em; font-weight: 600; padding-bottom: 0.3rem;
  }
  .cal-cell {
    background: #0f172a; border-radius: 8px; min-height: 90px; padding: 5px;
    display: flex; flex-direction: column; gap: 3px;
  }
  .cal-cell.empty { background: transparent; }
  .cal-cell.today { outline: 1px solid #6366f1; outline-offset: -1px; }
  .cal-daynum { font-size: 0.72rem; color: #64748b; font-weight: 600; padding: 1px 3px; }
  .cal-cell.today .cal-daynum { color: #a5b4fc; }
  .cal-chip {
    font-size: 0.68rem; line-height: 1.25; padding: 3px 5px; border-radius: 5px;
    cursor: pointer; border-left: 3px solid; white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; transition: filter 0.12s;
  }
  .cal-chip:hover { filter: brightness(1.4); }
  .cal-chip.active { box-shadow: 0 0 0 1.5px #e2e8f0; }

  .legend { display: flex; flex-wrap: wrap; gap: 0.45rem 0.9rem; margin-top: 1rem; }
  .legend-item { display: flex; align-items: center; gap: 0.35rem; font-size: 0.72rem; color: #94a3b8; }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

  @media (max-width: 640px) {
    .cal-cell { min-height: 64px; }
    .cal-chip { font-size: 0.6rem; padding: 2px 4px; }
  }

  #detail { display: none; }
  #map { height: 350px; border-radius: 10px; margin-top: 0.5rem; }
  .uplot { display: block; margin: 0 auto; }

  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .detail-full { margin-bottom: 1rem; }
  @media (max-width: 700px) { .detail-grid { grid-template-columns: 1fr; } }

  .splits-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  .splits-table th { text-align: left; color: #64748b; font-weight: 500; padding: 0.4rem 0.5rem; border-bottom: 1px solid #334155; }
  .splits-table td { padding: 0.4rem 0.5rem; border-bottom: 1px solid #1e293b; }
  .splits-table tr:hover { background: #0f172a; }
  .pace-bar { height: 4px; border-radius: 2px; margin-top: 2px; }
</style>
</head>
<body>
<div class="header">
  <a href="/">&larr; Dashboard</a>
  <h1>Workouts</h1>
</div>
<div id="app"></div>
<div id="detail"></div>

<script>
var C = { rose: '#f43f5e', indigo: '#6366f1', emerald: '#10b981', amber: '#f59e0b', cyan: '#06b6d4', slate: '#64748b' };

var useMiles = true;
var useFeet = true;
var hrZones = [104, 123, 142, 161, 180];
var ZONE_COLORS = ['#94a3b8', '#10b981', '#f59e0b', '#f97316', '#ef4444'];
var ZONE_NAMES = ['Z1 Recovery', 'Z2 Aerobic', 'Z3 Tempo', 'Z4 Threshold', 'Z5 Max'];

function getZone(bpm) {
  for (var i = 4; i >= 0; i--) {
    if (bpm >= hrZones[i]) return i;
  }
  return 0;
}

function zoneColor(bpm) { return ZONE_COLORS[getZone(bpm)]; }

function distVal(meters) { return useMiles ? meters / 1609.344 : meters / 1000; }
function distUnit() { return useMiles ? 'mi' : 'km'; }
function elevVal(meters) { return useFeet ? meters * 3.28084 : meters; }
function elevUnit() { return useFeet ? 'ft' : 'm'; }
function paceLabel() { return useMiles ? '/mi' : '/km'; }
function speedUnit() { return useMiles ? 'mph' : 'km/h'; }
function paceFromSec(secPerKm) { return useMiles ? secPerKm * 1.60934 : secPerKm; }
function speedFromKmh(kmh) { return useMiles ? kmh / 1.60934 : kmh; }

const TYPE_NAMES = {
  running: 'Running', cycling: 'Cycling', swimming: 'Swimming', walking: 'Walking',
  hiking: 'Hiking', strength: 'Strength Training', yoga: 'Yoga',
  hiit: 'HIIT', elliptical: 'Elliptical', rowing: 'Rowing',
  stair_climbing: 'Stair Climbing', dance: 'Dance', pilates: 'Pilates',
  core_training: 'Core Training', cross_training: 'Cross Training',
  kickboxing: 'Kickboxing', martial_arts: 'Martial Arts',
};

function typeName(wtype) {
  if (TYPE_NAMES[wtype]) return TYPE_NAMES[wtype];
  return wtype.replace(/_/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
}

function sv(obj) { return obj ? obj.value : null; }

function toHM(seconds) {
  if (!seconds || seconds <= 0) return '--';
  var h = Math.floor(seconds / 3600), m = Math.round((seconds % 3600) / 60);
  return h > 0 ? h + 'h ' + m + 'm' : m + 'm';
}

function calDur(w) {
  // Compact duration for calendar chips: <1hr -> "36m", >=1hr -> "1.5hr".
  var min = w.duration ? sv(w.duration) : (new Date(w.end) - new Date(w.start)) / 60000;
  if (!min || min <= 0) return '';
  return min < 60 ? Math.round(min) + 'm' : (min / 60).toFixed(1) + 'hr';
}

function toHMS(seconds) {
  if (!seconds || seconds <= 0) return '--';
  var h = Math.floor(seconds / 3600), m = Math.floor((seconds % 3600) / 60), s = Math.round(seconds % 60);
  if (h > 0) return h + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  return m + ':' + String(s).padStart(2, '0');
}

function fmtPace(secPerKm) {
  if (!secPerKm || !isFinite(secPerKm)) return '--';
  var m = Math.floor(secPerKm / 60), s = Math.round(secPerKm % 60);
  return m + ':' + String(s).padStart(2, '0');
}

function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}

function fmtTime(iso) {
  return new Date(iso).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', timeZone: 'America/Los_Angeles' });
}

function haversine(lat1, lon1, lat2, lon2) {
  var R = 6371000;
  var dLat = (lat2 - lat1) * Math.PI / 180;
  var dLon = (lon2 - lon1) * Math.PI / 180;
  var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLon / 2) * Math.sin(dLon / 2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function parseGpx(gpx) {
  // Parse a GPX document into the point shape analyzeRoute/renderMap expect.
  var doc = new DOMParser().parseFromString(gpx, 'application/xml');
  var pts = doc.getElementsByTagName('trkpt');
  var out = [];
  for (var i = 0; i < pts.length; i++) {
    var p = pts[i];
    var ele = p.getElementsByTagName('ele')[0];
    var t = p.getElementsByTagName('time')[0];
    out.push({
      lat: parseFloat(p.getAttribute('lat')),
      lon: parseFloat(p.getAttribute('lon')),
      altitude: ele ? parseFloat(ele.textContent) : null,
      timestamp: t ? t.textContent : null,
    });
  }
  return out;
}

function analyzeRoute(route) {
  var totalDist = 0, elevGain = 0, elevLoss = 0;
  var distances = [0];
  var elevations = [];
  var timestamps = [];

  for (var i = 0; i < route.length; i++) {
    timestamps.push(new Date(route[i].timestamp).getTime() / 1000);
    if (route[i].altitude != null) elevations.push(route[i].altitude);
    if (i > 0) {
      var d = haversine(route[i - 1].lat, route[i - 1].lon, route[i].lat, route[i].lon);
      totalDist += d;
      distances.push(totalDist);
      if (route[i].altitude != null && route[i - 1].altitude != null) {
        var dElev = route[i].altitude - route[i - 1].altitude;
        if (dElev > 0.5) elevGain += dElev;
        else if (dElev < -0.5) elevLoss -= dElev;
      }
    }
  }

  var splits = [];
  var splitIdx = 0;
  var splitMeters = useMiles ? 1609.344 : 1000;
  for (var km = 1; km * splitMeters <= totalDist + 1; km++) {
    var target = km * splitMeters;
    while (splitIdx < distances.length - 1 && distances[splitIdx + 1] < target) splitIdx++;
    if (splitIdx < timestamps.length - 1) {
      var frac = (target - distances[splitIdx]) / (distances[splitIdx + 1] - distances[splitIdx] || 1);
      var splitTime = timestamps[splitIdx] + frac * (timestamps[splitIdx + 1] - timestamps[splitIdx]);
      var prevTarget = (km - 1) * splitMeters;
      var prevIdx = 0;
      for (var j = 0; j < distances.length; j++) { if (distances[j] <= prevTarget) prevIdx = j; }
      var prevFrac = prevTarget > 0 ? (prevTarget - distances[prevIdx]) / (distances[prevIdx + 1] - distances[prevIdx] || 1) : 0;
      var prevTime = km === 1 ? timestamps[0] : timestamps[prevIdx] + prevFrac * (timestamps[prevIdx + 1] - timestamps[prevIdx]);
      var splitElev = null;
      if (elevations.length > splitIdx) {
        var startElev = km === 1 ? elevations[0] : elevations[prevIdx];
        var endElev = elevations[splitIdx];
        splitElev = endElev - startElev;
      }
      splits.push({ km: km, pace: splitTime - prevTime, elev: splitElev });
    }
  }

  return { totalDist: totalDist, elevGain: elevGain, elevLoss: elevLoss, distances: distances, elevations: elevations, timestamps: timestamps, splits: splits };
}

var workouts = [];
var map = null;
var detailCache = {};
var detailReq = 0;

// Calendar state
var TYPE_PALETTE = ['#6366f1', '#10b981', '#f43f5e', '#f59e0b', '#06b6d4',
                    '#a855f7', '#ec4899', '#84cc16', '#2dd4bf', '#fb923c'];
var GREY = '#64748b';
var MONTHS = ['January', 'February', 'March', 'April', 'May', 'June', 'July',
              'August', 'September', 'October', 'November', 'December'];
var typeColors = {};
var byDate = {};
var seenIds = {};
var loadedMonths = {};
var loadingMonths = {};
var viewYear, viewMonth;
var activeIdx = -1;

function computeTypeColors(list) {
  // Allocate the palette to the most frequent types over the last ~year (the
  // `list` passed in), so the mapping stays stable as new months are paged in;
  // the rest share grey, as do older types that drop out of the recent top-N.
  var counts = {};
  list.forEach(function(w) { counts[w.workout_type] = (counts[w.workout_type] || 0) + 1; });
  var types = Object.keys(counts).sort(function(a, b) {
    return counts[b] - counts[a] || a.localeCompare(b);
  });
  typeColors = {};
  types.forEach(function(t, i) { typeColors[t] = i < TYPE_PALETTE.length ? TYPE_PALETTE[i] : GREY; });
}

function colorForType(t) { return typeColors[t] || GREY; }

function dateKey(iso) {
  // Group workouts by their LA calendar date, matching the displayed times.
  return new Date(iso).toLocaleDateString('en-CA', { timeZone: 'America/Los_Angeles' });
}

function addWorkouts(list) {
  // Append-only so existing indices (and activeIdx) stay valid; dedup by id
  // since padded month ranges and the year fetch overlap at boundaries.
  list.forEach(function(w) {
    if (!w.id || seenIds[w.id]) return;
    seenIds[w.id] = true;
    var i = workouts.length;
    workouts.push(w);
    var k = dateKey(w.start);
    (byDate[k] = byDate[k] || []).push(i);
  });
}

function indexOfLatest() {
  var best = 0, bestT = -Infinity;
  for (var i = 0; i < workouts.length; i++) {
    var t = new Date(workouts[i].start).getTime();
    if (t > bestT) { bestT = t; best = i; }
  }
  return best;
}

function shiftMonth(y, m, d) {
  m += d;
  while (m < 0) { m += 12; y--; }
  while (m > 11) { m -= 12; y++; }
  return { y: y, m: m };
}

function monthKey(y, m) { return y + '-' + pad2(m + 1); }

function isoUTC(ms) { return new Date(ms).toISOString().replace('Z', '+00:00'); }

function monthRange(y, m) {
  // Pad a day on each side so PST/PDT skew can't drop boundary workouts; final
  // placement is by dateKey, and dedup handles the overlap.
  return [isoUTC(Date.UTC(y, m, 1) - 86400000), isoUTC(Date.UTC(y, m + 1, 1) + 86400000)];
}

function markYearLoaded() {
  // The initial year fetch fully covers every month from just after its cutoff
  // through the current month; mark them loaded so paging doesn't refetch.
  var now = new Date();
  var cut = new Date(now.getTime() - 365 * 86400000);
  var p = shiftMonth(cut.getFullYear(), cut.getMonth(), 1);  // skip the partial boundary month
  var y = p.y, m = p.m, cy = now.getFullYear(), cm = now.getMonth();
  while (y < cy || (y === cy && m <= cm)) {
    loadedMonths[monthKey(y, m)] = true;
    var n = shiftMonth(y, m, 1); y = n.y; m = n.m;
  }
}

async function fetchMonth(y, m) {
  var key = monthKey(y, m);
  if (loadedMonths[key] || loadingMonths[key]) return;
  loadingMonths[key] = true;
  try {
    var r = monthRange(y, m);
    var resp = await fetch('/api/workouts?start=' + encodeURIComponent(r[0])
      + '&end=' + encodeURIComponent(r[1]) + '&limit=500');
    addWorkouts((await resp.json()).data || []);
    loadedMonths[key] = true;
  } catch (e) { /* leave unloaded; retried on next navigation */ }
  delete loadingMonths[key];
  if (y === viewYear && m === viewMonth) renderCalendar();
}

function ensureMonths() {
  // Fetch the visible month plus its neighbors so paging feels instant.
  fetchMonth(viewYear, viewMonth);
  var p = shiftMonth(viewYear, viewMonth, -1), n = shiftMonth(viewYear, viewMonth, 1);
  fetchMonth(p.y, p.m);
  fetchMonth(n.y, n.m);
}

function pad2(n) { return String(n).padStart(2, '0'); }
function cellKey(y, m, d) { return y + '-' + pad2(m + 1) + '-' + pad2(d); }
function todayKey() { return new Date().toLocaleDateString('en-CA', { timeZone: 'America/Los_Angeles' }); }

function hexA(hex, a) {
  var n = parseInt(hex.slice(1), 16);
  return 'rgba(' + ((n >> 16) & 255) + ',' + ((n >> 8) & 255) + ',' + (n & 255) + ',' + a + ')';
}

function esc(s) {
  return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
}

function renderCalendar() {
  var first = new Date(viewYear, viewMonth, 1);
  var startDow = first.getDay();
  var daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  var tKey = todayKey();

  var loading = !!loadingMonths[monthKey(viewYear, viewMonth)];
  var html = '<div class="cal-wrap">';
  html += '<div class="cal-head"><div class="cal-title">' + MONTHS[viewMonth] + ' ' + viewYear
    + (loading ? ' <span class="cal-load">loading…</span>' : '') + '</div>';
  html += '<div class="cal-nav">'
    + '<button class="cal-btn" id="cal-prev" title="Previous month">&lsaquo;</button>'
    + '<button class="cal-btn cal-today" id="cal-jump">Today</button>'
    + '<button class="cal-btn" id="cal-next" title="Next month">&rsaquo;</button>'
    + '</div></div>';

  html += '<div class="cal-grid">';
  ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].forEach(function(d) {
    html += '<div class="cal-dow">' + d + '</div>';
  });

  for (var b = 0; b < startDow; b++) html += '<div class="cal-cell empty"></div>';

  for (var day = 1; day <= daysInMonth; day++) {
    var k = cellKey(viewYear, viewMonth, day);
    var cls = 'cal-cell' + (k === tKey ? ' today' : '');
    html += '<div class="' + cls + '"><div class="cal-daynum">' + day + '</div>';
    var idxs = (byDate[k] || []).slice().sort(function(a, c) {
      return new Date(workouts[a].start) - new Date(workouts[c].start);
    });
    idxs.forEach(function(i) {
      var w = workouts[i];
      var col = colorForType(w.workout_type);
      var dur = w.duration ? toHM(sv(w.duration) * 60) : '';
      var dist = w.distance ? distVal(sv(w.distance)).toFixed(1) + ' ' + distUnit() : '';
      var tip = typeName(w.workout_type) + ' · ' + fmtTime(w.start)
        + (dur ? ' · ' + dur : '') + (dist ? ' · ' + dist : '');
      html += '<div class="cal-chip' + (i === activeIdx ? ' active' : '') + '" data-idx="' + i + '"'
        + ' title="' + esc(tip) + '"'
        + ' style="background:' + hexA(col, 0.16) + ';border-left-color:' + col + '">'
        + esc(typeName(w.workout_type)) + (calDur(w) ? ' - ' + calDur(w) : '') + '</div>';
    });
    html += '</div>';
  }

  var trail = (startDow + daysInMonth) % 7;
  if (trail) for (var t = trail; t < 7; t++) html += '<div class="cal-cell empty"></div>';

  html += '</div>';
  html += '<div class="legend">' + legendHtml() + '</div>';
  html += '</div>';

  document.getElementById('app').innerHTML = html;

  document.getElementById('cal-prev').addEventListener('click', function() { stepMonth(-1); });
  document.getElementById('cal-next').addEventListener('click', function() { stepMonth(1); });
  document.getElementById('cal-jump').addEventListener('click', function() {
    var n = new Date();
    viewYear = n.getFullYear(); viewMonth = n.getMonth();
    ensureMonths();
    renderCalendar();
  });
  document.querySelectorAll('.cal-chip').forEach(function(el) {
    el.addEventListener('click', function() { selectWorkout(parseInt(el.dataset.idx)); });
  });
}

function legendHtml() {
  var html = '';
  Object.keys(typeColors).forEach(function(t) {
    if (typeColors[t] === GREY) return;
    html += '<div class="legend-item"><span class="legend-dot" style="background:' + typeColors[t]
      + '"></span>' + esc(typeName(t)) + '</div>';
  });
  var hasOther = Object.keys(typeColors).some(function(t) { return typeColors[t] === GREY; });
  if (hasOther) html += '<div class="legend-item"><span class="legend-dot" style="background:' + GREY
    + '"></span>Other</div>';
  return html;
}

function stepMonth(delta) {
  var s = shiftMonth(viewYear, viewMonth, delta);
  viewYear = s.y; viewMonth = s.m;
  ensureMonths();
  renderCalendar();
}

function selectWorkout(idx) {
  activeIdx = idx;
  document.querySelectorAll('.cal-chip').forEach(function(e) {
    e.classList.toggle('active', parseInt(e.dataset.idx) === idx);
  });
  showDetail(idx);
}

async function load() {
  var now = new Date();
  var [settingsResp, resp] = await Promise.all([
    fetch('/api/settings'),
    fetch('/api/workouts?start=' + encodeURIComponent(isoUTC(now.getTime() - 365 * 86400000))
      + '&end=' + encodeURIComponent(isoUTC(now.getTime())) + '&limit=2000'),
  ]);
  var settings = await settingsResp.json();
  useMiles = settings.distance_unit === 'mi';
  useFeet = settings.elevation_unit === 'ft';
  hrZones = [
    parseInt(settings.hr_zone_1) || 104,
    parseInt(settings.hr_zone_2) || 123,
    parseInt(settings.hr_zone_3) || 142,
    parseInt(settings.hr_zone_4) || 161,
    parseInt(settings.hr_zone_5) || 180,
  ];
  var yearData = (await resp.json()).data || [];

  var app = document.getElementById('app');
  if (yearData.length === 0) {
    // No workouts in the last year; fall back to the most recent ones so an
    // inactive history still opens on a populated month.
    var r2 = await fetch('/api/workouts?limit=50');
    yearData = (await r2.json()).data || [];
  }
  if (yearData.length === 0) {
    app.innerHTML = '<div class="no-data">No workouts yet.</div>';
    return;
  }

  addWorkouts(yearData);
  computeTypeColors(yearData);
  markYearLoaded();

  // Open on the most recent workout's month, with that workout selected.
  var latestIdx = indexOfLatest();
  var latest = dateKey(workouts[latestIdx].start).split('-');
  viewYear = parseInt(latest[0]);
  viewMonth = parseInt(latest[1]) - 1;
  activeIdx = latestIdx;

  ensureMonths();
  renderCalendar();
  showDetail(latestIdx);
}

async function showDetail(idx) {
  var detail = document.getElementById('detail');
  detail.style.display = 'block';

  // The list carries only scalar summaries; fetch the full workout (heart-rate
  // trace + route) on demand, caching per id.
  var w = workouts[idx];
  var myReq = ++detailReq;
  var full = detailCache[w.id];
  if (!full) {
    detail.innerHTML = '<div class="card">Loading…</div>';
    try {
      var r = await fetch('/api/workouts/' + encodeURIComponent(w.id));
      full = await r.json();
    } catch (e) { full = null; }
    if (myReq !== detailReq) return;  // superseded by a newer selection
    if (full && full.id) detailCache[w.id] = full;
  }
  if (full && full.id) w = full;

  var type = typeName(w.workout_type);
  var durSec = (new Date(w.end) - new Date(w.start)) / 1000;
  var durVal = w.duration ? sv(w.duration) * 60 : durSec;

  var hasHR = w.heart_rate && w.heart_rate.samples && w.heart_rate.samples.length > 0;
  var route = w.route_gpx ? parseGpx(w.route_gpx) : null;
  var hasRoute = route && route.length > 1;
  var ra = hasRoute ? analyzeRoute(route) : null;

  var html = '<div class="card"><h3>' + type + ' &mdash; ' + fmtDate(w.start) + ', ' + fmtTime(w.start) + ' - ' + fmtTime(w.end) + '</h3>';
  html += '<div class="metrics">';

  html += m('Duration', toHMS(durVal));
  if (ra) html += m('Distance', distVal(ra.totalDist).toFixed(2) + ' ' + distUnit());
  else if (w.distance) html += m('Distance', distVal(sv(w.distance)).toFixed(2) + ' ' + distUnit());
  if (ra && ra.totalDist > 0 && durVal > 0) {
    var pacePerUnit = useMiles ? durVal / (ra.totalDist / 1609.344) : durVal / (ra.totalDist / 1000);
    html += m('Avg Pace', fmtPace(pacePerUnit) + ' ' + paceLabel());
    html += m('Avg Speed', speedFromKmh((ra.totalDist / 1000) / (durVal / 3600)).toFixed(1) + ' ' + speedUnit());
  }
  if (w.calories) html += m('Calories', Math.round(sv(w.calories)) + ' kcal');
  if (w.average_heart_rate) html += m('Avg HR', Math.round(sv(w.average_heart_rate)) + ' bpm');
  if (w.max_heart_rate) html += m('Max HR', Math.round(sv(w.max_heart_rate)) + ' bpm');
  if (ra && ra.elevGain > 0) html += m('Elev Gain', Math.round(elevVal(ra.elevGain)) + ' ' + elevUnit());
  if (ra && ra.elevLoss > 0) html += m('Elev Loss', Math.round(elevVal(ra.elevLoss)) + ' ' + elevUnit());
  if (ra && ra.elevations.length > 0) {
    html += m('Min Elev', Math.round(elevVal(Math.min.apply(null, ra.elevations))) + ' ' + elevUnit());
    html += m('Max Elev', Math.round(elevVal(Math.max.apply(null, ra.elevations))) + ' ' + elevUnit());
  }

  html += '</div></div>';

  if (hasRoute) {
    html += '<div class="detail-grid">';
    html += '<div class="card"><h3>Route</h3><div id="map"></div></div>';
    if (ra.elevations.length > 1) {
      html += '<div class="card"><h3>Elevation</h3><div id="elev-chart"></div></div>';
    }
    html += '</div>';
  }

  if (hasHR) {
    html += '<div class="detail-grid">';
    html += '<div class="card"><h3>Heart Rate</h3><div id="hr-chart"></div></div>';
    html += '<div class="card"><h3>Time in Zones</h3><div id="zone-chart" style="max-width:280px;margin:0 auto"></div>';
    html += '<div id="zone-legend" style="margin-top:0.75rem"></div></div>';
    html += '</div>';
  }

  if (ra && ra.splits.length > 0) {
    var fastestPace = Math.min.apply(null, ra.splits.map(function(s) { return s.pace; }));
    var slowestPace = Math.max.apply(null, ra.splits.map(function(s) { return s.pace; }));
    html += '<div class="card"><h3>Splits</h3>';
    var splitLabel = useMiles ? 'Mile' : 'KM';
    html += '<table class="splits-table"><thead><tr><th>' + splitLabel + '</th><th>Pace</th><th>Elev</th><th></th></tr></thead><tbody>';
    ra.splits.forEach(function(s) {
      var pct = slowestPace > fastestPace ? 100 - ((s.pace - fastestPace) / (slowestPace - fastestPace) * 60) : 100;
      var barColor = s.pace <= fastestPace * 1.05 ? C.emerald : s.pace >= slowestPace * 0.95 ? C.rose : C.indigo;
      var elevStr = s.elev != null ? (s.elev >= 0 ? '+' : '') + Math.round(elevVal(s.elev)) + ' ' + elevUnit() : '--';
      html += '<tr><td>' + s.km + '</td><td>' + fmtPace(s.pace) + ' ' + paceLabel() + '</td><td>' + elevStr + '</td>'
        + '<td style="width:40%"><div class="pace-bar" style="width:' + pct + '%;background:' + barColor + '"></div></td></tr>';
    });
    html += '</tbody></table></div>';
  }

  detail.innerHTML = html;

  if (hasRoute) renderMap(route);
  if (ra && ra.elevations.length > 1) renderElevation(ra);
  if (hasHR) {
    renderHR(w.heart_rate.samples);
    renderZonePie(w.heart_rate.samples);
  }
}

function m(label, val) {
  return '<div class="metric"><div class="val">' + val + '</div><div class="lbl">' + label + '</div></div>';
}

function renderHR(samples) {
  var container = document.getElementById('hr-chart');
  if (!container) return;
  var width = container.clientWidth - 8;

  var ts = new Float64Array(samples.length);
  var vals = new Float64Array(samples.length);
  for (var i = 0; i < samples.length; i++) {
    ts[i] = new Date(samples[i].timestamp).getTime() / 1000;
    vals[i] = samples[i].value;
  }

  var yMin = Math.floor((Math.min.apply(null, vals) - 5) / 10) * 10;
  var yMax = Math.ceil((Math.max.apply(null, vals) + 5) / 10) * 10;

  var u = new uPlot({
    width: width, height: 250, pxAlign: 0,
    cursor: { drag: { x: true, y: false } },
    select: { over: false },
    legend: { show: false },
    scales: {
      y: { auto: false, range: [yMin, yMax] },
    },
    axes: [
      { stroke: '#64748b', grid: { stroke: '#1e293b' }, ticks: { stroke: '#334155' }, font: '10px system-ui',
        values: function(u, vs) {
          return vs.map(function(v) {
            return new Date(v * 1000).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', timeZone: 'America/Los_Angeles' });
          });
        }
      },
      { stroke: '#64748b', grid: { show: false }, ticks: { stroke: '#334155' }, font: '10px system-ui',
        splits: function(u) {
          var r = u.scales.y;
          var lo = Math.ceil(r.min / 10) * 10;
          var hi = Math.floor(r.max / 10) * 10;
          var out = [];
          for (var v = lo; v <= hi; v += 10) out.push(v);
          return out;
        },
        values: function(u, vs) { return vs.map(function(v) { return v + ''; }); }
      },
    ],
    series: [ {},
      { stroke: '#e2e8f0', width: 1.5, fill: 'rgba(226,232,240,0.04)',
        points: { show: false }, label: 'bpm' },
    ],
    hooks: {
      drawAxes: [function(u) {
        var ctx = u.ctx;
        var left = u.bbox.left;
        var w = u.bbox.width;
        var zoneFills = [
          'rgba(148,163,184,0.15)',
          'rgba(16,185,129,0.20)',
          'rgba(245,158,11,0.20)',
          'rgba(249,115,22,0.22)',
          'rgba(239,68,68,0.25)',
        ];
        var bands = [
          [0, hrZones[0]],
          [hrZones[0], hrZones[1]],
          [hrZones[1], hrZones[2]],
          [hrZones[2], hrZones[3]],
          [hrZones[3], 300],
        ];
        ctx.save();
        for (var i = 0; i < bands.length; i++) {
          var lo = Math.max(bands[i][0], u.scales.y.min);
          var hi = Math.min(bands[i][1], u.scales.y.max);
          if (lo >= hi) continue;
          var y0 = u.valToPos(hi, 'y', true);
          var y1 = u.valToPos(lo, 'y', true);
          ctx.fillStyle = zoneFills[i];
          ctx.fillRect(left, y0, w, y1 - y0);
        }
        ctx.restore();
      }],
    },
  }, [ts, vals], container);
}

function renderZonePie(samples) {
  var container = document.getElementById('zone-chart');
  if (!container) return;

  var zoneMins = [0, 0, 0, 0, 0];
  for (var i = 0; i < samples.length; i++) {
    var z = getZone(samples[i].value);
    var dt = 1;
    if (i < samples.length - 1) {
      dt = (new Date(samples[i + 1].timestamp) - new Date(samples[i].timestamp)) / 60000;
      if (dt > 10) dt = 1;
    }
    zoneMins[z] += dt;
  }

  var total = zoneMins.reduce(function(a, b) { return a + b; }, 0);
  var hasData = zoneMins.filter(function(v) { return v > 0; });
  if (hasData.length === 0) return;

  var canvas = document.createElement('canvas');
  canvas.width = 280; canvas.height = 280;
  container.appendChild(canvas);

  new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: ZONE_NAMES,
      datasets: [{
        data: zoneMins,
        backgroundColor: ZONE_COLORS,
        borderWidth: 0,
      }],
    },
    options: {
      responsive: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: function(c) {
              var min = c.raw;
              var pct = total > 0 ? Math.round(min / total * 100) : 0;
              return c.label + ': ' + Math.round(min) + 'm (' + pct + '%)';
            }
          }
        }
      },
      cutout: '55%',
    },
  });

  var legend = document.getElementById('zone-legend');
  var html = '';
  for (var i = 0; i < 5; i++) {
    if (zoneMins[i] < 0.1) continue;
    var pct = total > 0 ? Math.round(zoneMins[i] / total * 100) : 0;
    html += '<div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.3rem;font-size:0.8rem">';
    html += '<div style="width:10px;height:10px;border-radius:2px;background:' + ZONE_COLORS[i] + '"></div>';
    html += '<span style="color:#94a3b8;width:100px">' + ZONE_NAMES[i] + '</span>';
    html += '<span>' + Math.round(zoneMins[i]) + 'm</span>';
    html += '<span style="color:#64748b">(' + pct + '%)</span>';
    html += '</div>';
  }
  legend.innerHTML = html;
}

function renderElevation(ra) {
  var container = document.getElementById('elev-chart');
  if (!container) return;
  var width = container.clientWidth - 8;

  var distArr = new Float64Array(ra.distances.length);
  var elevArr = new Float64Array(ra.elevations.length);
  var len = Math.min(ra.distances.length, ra.elevations.length);
  for (var i = 0; i < len; i++) {
    distArr[i] = distVal(ra.distances[i]);
    elevArr[i] = elevVal(ra.elevations[i]);
  }

  var eMin = Math.floor(Math.min.apply(null, elevArr) / 10) * 10 - 10;
  var eMax = Math.ceil(Math.max.apply(null, elevArr) / 10) * 10 + 10;
  var du = distUnit(), eu = elevUnit();

  new uPlot({
    width: width, height: 200, pxAlign: 0,
    cursor: { drag: { x: false, y: false } },
    legend: { show: false },
    scales: {
      x: { auto: true },
      y: { auto: false, range: [eMin, eMax] },
    },
    axes: [
      { stroke: '#64748b', grid: { stroke: '#1e293b' }, ticks: { stroke: '#334155' }, font: '10px system-ui',
        values: function(u, vs) { return vs.map(function(v) { return v.toFixed(1) + ' ' + du; }); }
      },
      { stroke: '#64748b', grid: { stroke: 'rgba(51,65,85,0.5)' }, ticks: { stroke: '#334155' }, font: '10px system-ui',
        values: function(u, vs) { return vs.map(function(v) { return Math.round(v) + ' ' + eu; }); }
      },
    ],
    series: [ {},
      { stroke: C.emerald, width: 1.5, fill: 'rgba(16,185,129,0.12)', points: { show: false }, label: 'Elevation' },
    ],
  }, [distArr.slice(0, len), elevArr], container);
}

function renderMap(route) {
  if (map) { map.remove(); map = null; }
  var mapEl = document.getElementById('map');
  if (!mapEl) return;

  map = L.map('map', { attributionControl: false, zoomControl: true });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);

  var coords = route.map(function(p) { return [p.lat, p.lon]; });
  var line = L.polyline(coords, { color: C.indigo, weight: 3, opacity: 0.9 }).addTo(map);
  L.circleMarker(coords[0], { radius: 6, color: C.emerald, fillColor: C.emerald, fillOpacity: 1 }).addTo(map);
  L.circleMarker(coords[coords.length - 1], { radius: 6, color: C.rose, fillColor: C.rose, fillOpacity: 1 }).addTo(map);
  map.fitBounds(line.getBounds(), { padding: [30, 30] });
}

load();
</script>
