[app]
name = "health-dashboard"
version = "0.1.0"
description = "Health data dashboard - visualizes wearable data from provider apps"

[runtime.container]
image = "Dockerfile"
port = 8080

[routing]
health_check = "/health"

[resources]
memory_mb = 128
cpu_millicores = 100

[[services.v2.consumes]]
service = "github.com/zack/services/health-data"
shortname = "health"
version = ">=0.1.0"
grants = ["full_access"]
